<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICE J | Checkout</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        header{
            background:#000;
            color:#fff;
            text-align:center;
            padding:20px;
        }

        .container{
            max-width:800px;
            margin:40px auto;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            margin-bottom:20px;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        input, select{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .order-summary{
            background:#f0f0f0;
            padding:20px;
            border-radius:8px;
            margin-top:20px;
        }

        .total{
            font-size:24px;
            font-weight:bold;
            margin-top:15px;
        }

        button{
            width:100%;
            padding:15px;
            background:#00c3ff;
            color:#fff;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
            margin-top:20px;
        }

        button:hover{
            background:#009fd1;
        }

        footer{
            text-align:center;
            padding:20px;
            background:#000;
            color:#fff;
            margin-top:40px;
        }
    </style>
</head>
<body>

<header>
    <h1>🧊 ICE J Checkout</h1>
</header>

<div class="container">

    <h2>Shipping Information</h2>

    <form>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number" required>
        </div>

        <div class="form-group">
            <label>Shipping Address</label>
            <input type="text" placeholder="Street Address" required>
        </div>

        <div class="form-group">
            <label>City</label>
            <input type="text" placeholder="City" required>
        </div>

        <div class="form-group">
            <label>Country</label>
            <select>
                <option>South Africa</option>
                <option>United States</option>
                <option>United Kingdom</option>
                <option>Canada</option>
            </select>
        </div>

        <h2>Payment Method</h2>

        <div class="form-group">
            <label>Card Number</label>
            <input type="text" placeholder="1234 5678 9012 3456">
        </div>

        <div class="form-group">
            <label>Expiry Date</label>
            <input type="text" placeholder="MM/YY">
        </div>

        <div class="form-group">
            <label>CVV</label>
            <input type="password" placeholder="***">
        </div>

        <div class="order-summary">
            <h3>Order Summary</h3>
            <p>ICE J Hoodie × 1</p>
            <p>ICE J Beanie × 1</p>

            <div class="total">
                Total: R1,299
            </div>
        </div>

        <button type="submit">Complete Order</button>

    </form>

</div>

<footer>
    <p>© 2026 ICE J Clothing. All Rights Reserved.</p>
</footer>

</body>
</html>
