<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICE J | Contact</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#000;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    margin-top:10px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

.hero{
    background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7));
    color:white;
    text-align:center;
    padding:80px 20px;
}

.contact-container{
    max-width:800px;
    margin:50px auto;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.contact-container h2{
    text-align:center;
    margin-bottom:20px;
}

form{
    display:flex;
    flex-direction:column;
}

input,
textarea{
    padding:15px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

textarea{
    resize:vertical;
    min-height:150px;
}

button{
    background:#000;
    color:white;
    border:none;
    padding:15px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    background:#0099ff;
}

.contact-info{
    text-align:center;
    margin-top:30px;
}

.contact-info p{
    margin:10px 0;
}

footer{
    background:#000;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:50px;
}
</style>
</head>

<body>

<header>
    <h1>ICE J 🧊</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Contact ICE J</h1>
    <p>Questions, Orders, Collaborations & Support</p>
</section>

<div class="contact-container">

    <h2>Send Us A Message</h2>

    <form>
        <input type="text" placeholder="Your Name" required>

        <input type="email" placeholder="Your Email" required>

        <input type="text" placeholder="Subject">

        <textarea placeholder="Write your message here..." required></textarea>

        <button type="submit">Send Message</button>
    </form>

    <div class="contact-info">
        <p>📧 Email: info@icej.co.za</p>
        <p>📱 WhatsApp: +27 XX XXX XXXX</p>
        <p>📍 South Africa</p>
        <p>Instagram: @icejofficial</p>
    </div>

</div>

<footer>
    <p>© 2026 ICE J. All Rights Reserved.</p>
</footer>

</body>
</html>
